<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messages - FarmConnect</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        gold: { 400: '#c9a962', 500: '#a38d6d', 600: '#8a7557' },
                        dark: { 900: '#0a0a0a', 800: '#141414', 700: '#1a1a1a', 600: '#252525', 500: '#333' },
                        agri: { 500: '#10b981', 600: '#059669' },
                        success: '#4ecca3',
                        danger: '#e85d75'
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="chat.css">
</head>
<body class="bg-gray-50 text-gray-900 dark:bg-dark-900 dark:text-gray-200 font-sans h-screen overflow-hidden flex flex-col lg:flex-row transition-colors duration-300">

    <div class="lg:hidden fixed top-0 left-0 right-0 z-50 glass-effect border-b border-gray-200 dark:border-dark-500">
        <div class="flex items-center justify-between px-4 py-3">
            <div class="flex items-center gap-3">
                <button onclick="window.history.back()" class="p-2 rounded-lg transition-colors hover:bg-gray-200 dark:hover:bg-dark-600">
                    <i data-lucide="arrow-left" class="w-5 h-5 text-gray-600 dark:text-gray-400"></i>
                </button>
                <span class="font-bold text-lg tracking-tight text-agri-600 dark:text-gold-400">MESSAGES</span>
            </div>
            <button onclick="toggleTheme()" class="p-2 rounded-lg transition-colors text-gray-600 hover:bg-gray-100 dark:text-gray-400 dark:hover:bg-dark-700">
                <i data-lucide="moon" class="w-5 h-5 hidden dark:block"></i>
                <i data-lucide="sun" class="w-5 h-5 block dark:hidden"></i>
            </button>
        </div>
    </div>

    <aside class="hidden lg:flex w-20 flex-col items-center py-6 h-full z-30 bg-white border-r border-gray-200 dark:bg-dark-800 dark:border-dark-500 transition-colors duration-300">
        <div class="mb-8">
            <div class="w-10 h-10 rounded-xl flex items-center justify-center bg-gradient-to-br from-agri-500 to-agri-600 dark:from-gold-400 dark:to-gold-600 text-white dark:text-dark-900">
                <i data-lucide="wheat" class="w-5 h-5"></i>
            </div>
        </div>
        <nav class="flex-1 flex flex-col gap-2 w-full px-3">
            <a href="market.html" class="nav-item flex items-center justify-center w-12 h-12 rounded-xl mx-auto transition-all text-gray-500 hover:text-agri-600 hover:bg-gray-100 dark:hover:bg-dark-700" title="Back to Market">
                <i data-lucide="arrow-left" class="w-5 h-5"></i>
            </a>
            <a href="#" class="nav-item active flex items-center justify-center w-12 h-12 rounded-xl mx-auto bg-agri-50 text-agri-600 dark:bg-gold-500/10 dark:text-gold-400" title="Messages">
                <i data-lucide="message-square" class="w-5 h-5"></i>
            </a>
        </nav>
        <div class="mt-auto flex flex-col gap-3 items-center w-full">
            <button onclick="toggleTheme()" class="w-12 h-12 rounded-xl flex items-center justify-center transition-all text-gray-500 hover:bg-gray-100 dark:hover:bg-dark-700" title="Toggle Theme">
                <i data-lucide="moon" class="w-5 h-5 hidden dark:block"></i>
                <i data-lucide="sun" class="w-5 h-5 block dark:hidden"></i>
            </button>
        </div>
    </aside>

    <main class="flex-1 flex h-full pt-14 lg:pt-0 overflow-hidden">
        
        <div id="contactListPanel" class="w-full lg:w-80 border-r border-gray-200 dark:border-dark-500 flex flex-col bg-white dark:bg-dark-900 transition-all">
            <div class="p-4 border-b border-gray-200 dark:border-dark-500">
                <h2 class="text-xl font-bold mb-4 text-gray-900 dark:text-white hidden lg:block">Messages</h2>
                <div class="relative">
                    <i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400"></i>
                    <input type="text" placeholder="Search chats..." class="w-full pl-9 pr-4 py-2 rounded-xl text-sm bg-gray-100 dark:bg-dark-800 border-none focus:ring-1 focus:ring-agri-500 dark:text-white">
                </div>
            </div>
            
            <div class="flex-1 overflow-y-auto" id="contactsContainer">
                </div>
        </div>

        <div id="chatWindowPanel" class="hidden lg:flex flex-1 flex-col bg-gray-50 dark:bg-dark-900 relative">
            
            <div class="h-16 px-4 border-b border-gray-200 dark:border-dark-500 flex items-center justify-between bg-white dark:bg-dark-800 shrink-0">
                <div class="flex items-center gap-3">
                    <button onclick="closeChatMobile()" class="lg:hidden p-1 mr-1 text-gray-500">
                        <i data-lucide="chevron-left" class="w-6 h-6"></i>
                    </button>
                    <div class="w-10 h-10 rounded-full bg-gray-200 dark:bg-dark-600 flex items-center justify-center font-bold text-gray-500" id="activeChatAvatar">
                        ?
                    </div>
                    <div>
                        <h3 class="font-bold text-sm text-gray-900 dark:text-white" id="activeChatName">Select a chat</h3>
                        <p class="text-xs text-success flex items-center gap-1">
                            <span class="w-2 h-2 rounded-full bg-success"></span> Online
                        </p>
                    </div>
                </div>
                <button class="p-2 text-gray-400 hover:text-gray-600 dark:hover:text-white">
                    <i data-lucide="more-vertical" class="w-5 h-5"></i>
                </button>
            </div>

            <div id="productContextCard" class="hidden mx-4 mt-4 p-3 rounded-xl bg-white border border-gray-200 dark:bg-dark-800 dark:border-dark-500 flex items-center gap-4 shrink-0 shadow-sm">
                <div class="text-3xl" id="contextIcon">📦</div>
                <div class="flex-1">
                    <p class="text-xs text-gray-500 dark:text-gray-400">Negotiating over:</p>
                    <p class="font-bold text-sm text-gray-900 dark:text-white" id="contextName">Product Name</p>
                </div>
                <div class="text-right">
                    <p class="text-xs text-gray-500 dark:text-gray-400">Listed Price</p>
                    <p class="font-bold text-agri-600 dark:text-gold-400" id="contextPrice">₦0</p>
                </div>
            </div>

            <div class="flex-1 overflow-y-auto p-4 space-y-4" id="chatHistory">
                <div class="h-full flex items-center justify-center text-gray-400 flex-col gap-2">
                    <i data-lucide="message-square" class="w-12 h-12 opacity-50"></i>
                    <p>Select a conversation to start messaging</p>
                </div>
            </div>

            <div class="p-4 bg-white border-t border-gray-200 dark:bg-dark-800 dark:border-dark-500 shrink-0">
                
                <div id="farmerOfferAction" class="hidden mb-3 flex items-center justify-end">
                    <button onclick="triggerOfferModal()" class="text-xs font-bold px-3 py-1.5 rounded-lg bg-gold-500/10 text-gold-600 dark:text-gold-400 border border-gold-500/20 hover:bg-gold-500/20 transition-colors flex items-center gap-1.5">
                        <i data-lucide="tag" class="w-3 h-3"></i> Send Custom Offer
                    </button>
                </div>

                <form id="chatForm" class="flex items-center gap-2">
                    <button type="button" class="p-2 text-gray-400 hover:text-agri-600 dark:hover:text-gold-400 transition-colors">
                        <i data-lucide="paperclip" class="w-5 h-5"></i>
                    </button>
                    <input type="text" id="messageInput" autocomplete="off" placeholder="Type your message..." disabled class="flex-1 rounded-xl py-3 px-4 bg-gray-100 dark:bg-dark-900 border-none focus:ring-1 focus:ring-agri-500 text-sm dark:text-white">
                    <button type="submit" disabled id="sendBtn" class="p-3 rounded-xl bg-agri-600 text-white hover:bg-agri-700 dark:bg-gold-600 dark:hover:bg-gold-500 transition-colors disabled:opacity-50">
                        <i data-lucide="send" class="w-5 h-5"></i>
                    </button>
                </form>
            </div>
            
        </div>
    </main>

    <script src="api.js"></script>
    <script src="chat.js"></script>
</body>
</html>
