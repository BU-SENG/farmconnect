<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FarmConnect - Agricultural Marketplace</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        gold: { 400: '#c9a962', 500: '#a38d6d', 600: '#8a7557' }, // Dark mode primary color
                        dark: { 900: '#0a0a0a', 800: '#141414', 700: '#1a1a1a', 600: '#252525', 500: '#333' }, // Dark mode backgrounds
                        agri: { 500: '#10b981', 600: '#059669' }, // Light mode primary color (Green)
                        success: '#4ecca3',
                        danger: '#e85d75'
                    }
                }
            }
        }
    </script>
    
    <link rel="stylesheet" href="index.css">
</head>
<body class="bg-gray-50 text-gray-900 dark:bg-dark-900 dark:text-gray-200 font-sans min-h-screen transition-colors duration-300">

    <div class="lg:hidden fixed top-0 left-0 right-0 z-50 glass-effect">
        <div class="flex items-center justify-between px-4 py-3">
            <div class="flex items-center gap-3">
                <button onclick="toggleMobileMenu()" class="p-2 rounded-lg transition-colors hover:bg-gray-200 dark:hover:bg-dark-600">
                    <i data-lucide="menu" class="w-5 h-5 text-gray-600 dark:text-gray-400"></i>
                </button>
                <span class="font-bold text-lg tracking-tight text-agri-600 dark:text-gold-400">FARMCONNECT</span>
            </div>
            <div class="flex items-center gap-2" id="mobileAuthArea">
                <button onclick="window.location.href='login.html'" class="p-2 rounded-lg hover:bg-gray-200 dark:hover:bg-dark-600">
                    <i data-lucide="user" class="w-5 h-5 text-gray-600 dark:text-gray-400"></i>
                </button>
            </div>
        </div>
    </div>

    <div id="mobileMenu" class="fixed inset-0 z-40 bg-white/95 dark:bg-dark-900/95 backdrop-blur-xl transform -translate-x-full transition-transform duration-300 lg:hidden">
        <div class="p-6 pt-20">
            <nav class="space-y-2">
                <a href="index.html" class="flex items-center gap-4 px-4 py-3 rounded-xl bg-agri-50 text-agri-600 dark:bg-gold-500/10 dark:text-gold-400">
                    <i data-lucide="home" class="w-5 h-5"></i>
                    <span class="font-medium">Home</span>
                </a>
                <a href="market.html" class="flex items-center gap-4 px-4 py-3 rounded-xl hover:bg-gray-100 text-gray-600 dark:hover:bg-dark-700 dark:text-gray-400 transition-colors">
                    <i data-lucide="trending-up" class="w-5 h-5"></i>
                    <span class="font-medium">Market Tracker</span>
                </a>
                <a href="orders.html" class="flex items-center gap-4 px-4 py-3 rounded-xl hover:bg-gray-100 text-gray-600 dark:hover:bg-dark-700 dark:text-gray-400 transition-colors">
                    <i data-lucide="clipboard-list" class="w-5 h-5"></i>
                    <span class="font-medium">Orders</span>
                </a>
                <a href="profile.html" class="flex items-center gap-4 px-4 py-3 rounded-xl hover:bg-gray-100 text-gray-600 dark:hover:bg-dark-700 dark:text-gray-400 transition-colors">
                    <i data-lucide="user" class="w-5 h-5"></i>
                    <span class="font-medium">My Profile</span>
                </a>
            </nav>
        </div>
    </div>

    <div class="flex min-h-screen pt-14 lg:pt-0">
        <aside class="hidden lg:flex w-20 flex-col items-center py-6 fixed h-full z-30 bg-white border-r border-gray-200 dark:bg-dark-800 dark:border-dark-500 transition-colors duration-300">
            
            <div class="mb-8">
                <div class="w-10 h-10 rounded-xl flex items-center justify-center bg-gradient-to-br from-agri-500 to-agri-600 dark:from-gold-400 dark:to-gold-600 text-white dark:text-dark-900">
                    <i data-lucide="wheat" class="w-5 h-5"></i>
                </div>
            </div>
            
            <nav class="flex-1 flex flex-col gap-2 w-full px-3">
                <a href="index.html" class="nav-item active flex items-center justify-center w-12 h-12 rounded-xl mx-auto bg-agri-50 text-agri-600 dark:bg-gold-500/10 dark:text-gold-400" title="Home">
                    <i data-lucide="home" class="w-5 h-5"></i>
                </a>
                <a href="market.html" class="nav-item flex items-center justify-center w-12 h-12 rounded-xl mx-auto transition-all text-gray-500 hover:text-agri-600 hover:bg-gray-100 dark:text-gray-500 dark:hover:text-gold-400 dark:hover:bg-dark-700" title="Market Tracker">
                    <i data-lucide="trending-up" class="w-5 h-5"></i>
                </a>
                <a href="orders.html" class="nav-item flex items-center justify-center w-12 h-12 rounded-xl mx-auto transition-all text-gray-500 hover:text-agri-600 hover:bg-gray-100 dark:text-gray-500 dark:hover:text-gold-400 dark:hover:bg-dark-700" title="Orders">
                    <i data-lucide="clipboard-list" class="w-5 h-5"></i>
                </a>
                <a href="profile.html" class="nav-item flex items-center justify-center w-12 h-12 rounded-xl mx-auto transition-all text-gray-500 hover:text-agri-600 hover:bg-gray-100 dark:text-gray-500 dark:hover:text-gold-400 dark:hover:bg-dark-700" title="My Profile">
                    <i data-lucide="user" class="w-5 h-5"></i>
                </a>
            </nav>

            <div class="mt-auto flex flex-col gap-3 items-center w-full">
                <button onclick="toggleTheme()" class="w-12 h-12 rounded-xl flex items-center justify-center transition-all text-gray-500 hover:bg-gray-100 hover:text-agri-600 dark:text-gray-400 dark:hover:bg-dark-700 dark:hover:text-gold-400" title="Toggle Theme">
                    <i data-lucide="moon" class="w-5 h-5 hidden dark:block"></i>
                    <i data-lucide="sun" class="w-5 h-5 block dark:hidden"></i>
                </button>

                <button class="w-12 h-12 rounded-xl transition-all flex items-center justify-center text-gray-500 hover:bg-gray-100 hover:text-agri-600 dark:text-gray-500 dark:hover:text-gold-400 dark:hover:bg-dark-700" title="Settings">
                    <i data-lucide="settings" class="w-5 h-5"></i>
                </button>
            </div>
        </aside>

        <main class="flex-1 lg:ml-20">
            
            <header class="sticky top-0 z-20 glass-effect">
                <div class="px-4 lg:px-8 py-4">
                    <div class="flex items-center justify-between gap-4 mb-4">
                        
                        <div class="hidden lg:block">
                            <h1 class="font-bold text-xl tracking-tight text-agri-600 dark:text-gold-400">FARMCONNECT</h1>
                            <p class="text-gray-500 text-sm">Agricultural Marketplace</p>
                        </div>
                        
                        <div class="flex-1 max-w-2xl">
                            <div class="relative">
                                <i data-lucide="search" class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-400 dark:text-gray-500"></i>
                                <input type="text" id="searchInput" class="search-focus w-full rounded-xl pl-12 pr-4 py-3 text-sm transition-all bg-gray-100 border border-gray-200 text-gray-900 placeholder-gray-500 dark:bg-dark-700 dark:border-dark-500 dark:text-gray-200 dark:placeholder-gray-500 focus:border-agri-500 dark:focus:border-gold-500/50" placeholder="Search for grains, tubers, vegetables, oils...">
                                <div class="hidden md:flex absolute right-3 top-1/2 -translate-y-1/2 gap-1">
                                    <kbd class="px-2 py-1 text-xs rounded bg-gray-200 text-gray-500 dark:bg-dark-600 dark:text-gray-400">⌘</kbd>
                                    <kbd class="px-2 py-1 text-xs rounded bg-gray-200 text-gray-500 dark:bg-dark-600 dark:text-gray-400">K</kbd>
                                </div>
                            </div>
                        </div>

                        <div id="authBtns" class="hidden md:flex items-center gap-3">
                            <button onclick="window.location.href='login.html'" class="px-4 py-2.5 text-sm font-medium transition-colors text-gray-600 hover:text-black dark:text-gray-300 dark:hover:text-white">
                                Log In
                            </button>
                            <button onclick="window.location.href='signup.html'" class="px-5 py-2.5 text-sm font-medium rounded-xl transition-all shadow-lg bg-gradient-to-r from-agri-500 to-agri-600 text-white shadow-agri-500/20 hover:from-agri-400 hover:to-agri-500 dark:bg-gradient-to-r dark:from-gold-500 dark:to-gold-600 dark:text-dark-900 dark:shadow-gold-500/20 dark:hover:from-gold-400 dark:hover:to-gold-500">
                                Sign Up
                            </button>
                        </div>

                        <div id="userProfile" class="hidden md:flex items-center gap-3 relative">
                            <div class="text-right hidden lg:block">
                                <p class="text-sm font-medium text-gray-900 dark:text-gray-200" id="userNameDisplay">User</p>
                                <p class="text-xs text-gray-500" id="userRoleDisplay">Buyer</p>
                            </div>
                            <button onclick="toggleDropdown()" class="relative group">
                                <img src="" id="userAvatar" class="w-10 h-10 rounded-xl border-2 transition-all object-cover border-gray-200 group-hover:border-agri-500 dark:border-dark-500 dark:group-hover:border-gold-500/50">
                                <div class="absolute -bottom-1 -right-1 w-4 h-4 bg-success rounded-full border-2 border-white dark:border-dark-800"></div>
                            </button>
                            
                            <div id="profileDropdown" class="hidden absolute right-0 top-14 w-56 rounded-xl shadow-2xl overflow-hidden bg-white border border-gray-100 dark:bg-dark-700 dark:border-dark-500">
                                <div class="p-4 border-b border-gray-100 dark:border-dark-500">
                                    <p class="font-medium text-gray-900 dark:text-gray-200" id="dropdownUserName">User</p>
                                    <p class="text-xs text-gray-500"><a href="/cdn-cgi/l/email-protection" class="__cf_email__" data-cfemail="5d282e382f1d3b3c2f303e323333383e29733e3230">[email&#160;protected]</a></p>
                                </div>
                                <a href="profile.html" class="flex items-center gap-3 px-4 py-3 text-sm transition-colors text-gray-700 hover:bg-gray-50 hover:text-agri-600 dark:text-gray-300 dark:hover:bg-dark-600 dark:hover:text-gold-400">
                                    <i data-lucide="user" class="w-4 h-4"></i> My Profile
                                </a>
                                <a href="#" class="flex items-center gap-3 px-4 py-3 text-sm transition-colors text-gray-700 hover:bg-gray-50 hover:text-agri-600 dark:text-gray-300 dark:hover:bg-dark-600 dark:hover:text-gold-400">
                                    <i data-lucide="settings" class="w-4 h-4"></i> Settings
                                </a>
                                <div class="border-t border-gray-100 dark:border-dark-500"></div>
                                <button onclick="logout()" class="w-full flex items-center gap-3 px-4 py-3 text-sm text-danger hover:bg-red-50 dark:hover:bg-dark-600 transition-colors">
                                    <i data-lucide="log-out" class="w-4 h-4"></i> Log Out
                                </button>
                            </div>
                        </div>
                    </div>

                    <div class="flex items-center gap-2 overflow-x-auto pb-2 scrollbar-hide">
                        <button class="filter-pill active px-4 py-2 rounded-full text-sm font-medium whitespace-nowrap" onclick="setFilter('all', this)">
                            <span class="flex items-center gap-2"><i data-lucide="flame" class="w-4 h-4"></i> Trending</span>
                        </button>
                        <button class="filter-pill px-4 py-2 rounded-full text-sm font-medium whitespace-nowrap text-gray-600 hover:text-gray-900 bg-gray-100 hover:bg-gray-200 dark:text-gray-400 dark:hover:text-gray-200 dark:bg-dark-700 dark:hover:bg-dark-600" onclick="setFilter('grains', this)">
                            <span class="flex items-center gap-2"><i data-lucide="wheat" class="w-4 h-4"></i> Grains</span>
                        </button>
                        <button class="filter-pill px-4 py-2 rounded-full text-sm font-medium whitespace-nowrap text-gray-600 hover:text-gray-900 bg-gray-100 hover:bg-gray-200 dark:text-gray-400 dark:hover:text-gray-200 dark:bg-dark-700 dark:hover:bg-dark-600" onclick="setFilter('tubers', this)">
                            <span class="flex items-center gap-2"><i data-lucide="circle-dot" class="w-4 h-4"></i> Tubers</span>
                        </button>
                        <button class="filter-pill px-4 py-2 rounded-full text-sm font-medium whitespace-nowrap text-gray-600 hover:text-gray-900 bg-gray-100 hover:bg-gray-200 dark:text-gray-400 dark:hover:text-gray-200 dark:bg-dark-700 dark:hover:bg-dark-600" onclick="setFilter('oils', this)">
                            <span class="flex items-center gap-2"><i data-lucide="droplet" class="w-4 h-4"></i> Oils</span>
                        </button>
                        <button class="filter-pill px-4 py-2 rounded-full text-sm font-medium whitespace-nowrap text-gray-600 hover:text-gray-900 bg-gray-100 hover:bg-gray-200 dark:text-gray-400 dark:hover:text-gray-200 dark:bg-dark-700 dark:hover:bg-dark-600" onclick="setFilter('vegetables', this)">
                            <span class="flex items-center gap-2"><i data-lucide="carrot" class="w-4 h-4"></i> Vegetables</span>
                        </button>
                        <button class="filter-pill px-4 py-2 rounded-full text-sm font-medium whitespace-nowrap text-gray-600 hover:text-gray-900 bg-gray-100 hover:bg-gray-200 dark:text-gray-400 dark:hover:text-gray-200 dark:bg-dark-700 dark:hover:bg-dark-600" onclick="setFilter('fruits', this)">
                            <span class="flex items-center gap-2"><i data-lucide="apple" class="w-4 h-4"></i> Fruits</span>
                        </button>
                    </div>
                </div>
            </header>

            <div class="px-4 lg:px-8 py-4 border-b border-gray-100 dark:border-dark-500/50">
                <div class="flex items-center gap-6 overflow-x-auto">
                    <div class="flex items-center gap-2 text-sm">
                        <div class="w-2 h-2 rounded-full bg-success animate-pulse"></div>
                        <span class="text-gray-500 dark:text-gray-400">Market</span>
                    </div>
                    <div class="flex items-center gap-2 text-sm">
                        <i data-lucide="users" class="w-4 h-4 text-agri-500 dark:text-gold-400"></i>
                        <span class="text-gray-500 dark:text-gray-400"><span class="text-gray-900 dark:text-gray-200 font-medium">2,847</span> Active Traders</span>
                    </div>
                    <div class="flex items-center gap-2 text-sm">
                        <i data-lucide="package" class="w-4 h-4 text-agri-500 dark:text-gold-400"></i>
                        <span class="text-gray-500 dark:text-gray-400"><span class="text-gray-900 dark:text-gray-200 font-medium">15,234</span> Tons Traded</span>
                    </div>
                    <div class="flex items-center gap-2 text-sm">
                        <i data-lucide="clock" class="w-4 h-4 text-agri-500 dark:text-gold-400"></i>
                        <span class="text-gray-500 dark:text-gray-400">Updated <span class="text-gray-900 dark:text-gray-200">just now</span></span>
                    </div>
                </div>
            </div>

            <div class="p-4 lg:p-8">
                <div id="card-container" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 2xl:grid-cols-4 gap-4 lg:gap-6">
                </div>
                
                <div id="emptyState" class="hidden py-20 text-center">
                    <div class="w-20 h-20 mx-auto mb-4 rounded-full flex items-center justify-center bg-gray-100 dark:bg-dark-700">
                        <i data-lucide="search-x" class="w-10 h-10 text-gray-400 dark:text-gray-500"></i>
                    </div>
                    <h3 class="text-lg font-medium text-gray-900 dark:text-gray-300 mb-2">No products found</h3>
                    <p class="text-gray-500">Try adjusting your search or filter</p>
                </div>
            </div>
    </div>

    <script src="api.js"></script>
    <script src="index.js"></script>
</body>
</html>
